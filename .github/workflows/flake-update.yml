name: Update flake.lock

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v12
      - uses: DeterminateSystems/magic-nix-cache-action@v7

      - name: Setup SSH for private inputs
        if: ${{ inputs.include_secrets == true }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s' "${{ secrets.SECRETS_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts

      - name: Update flake.lock (including private inputs)
        if: ${{ inputs.include_secrets == true }}
        uses: DeterminateSystems/update-flake-lock@v25
        with:
          pr-title: "chore(flake): update flake.lock (including secrets)"
          pr-labels: |
            dependencies
            nix
